<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Attendance Tracker</h1>

<div class="status-card">
<div id="status" class="status">Not Tapped In</div>
<div id="current-session" class="current-session"></div>
</div>

<div class="action-buttons">
<button id="tap-in-btn" class="btn btn-primary">Tap In</button>
<button id="tap-out-btn" class="btn btn-secondary" disabled>Tap Out</button>
</div>

<div class="manual-button-row">
<button id="manual-entry-btn" class="btn btn-manual">Manual Entry</button>
</div>


<div class="stats-grid">

<div class="stat-card">
<div class="stat-label">Today's Hours</div>
<div id="today-hours" class="stat-value">0.00</div>
</div>

<div class="stat-card">
<div class="stat-label">This Month</div>
<div id="month-hours" class="stat-value">0.00</div>
</div>

<div class="stat-card">
<div class="stat-label">Remaining</div>
<div id="remaining-hours" class="stat-value">200.00</div>
</div>

<div class="stat-card">
<div class="stat-label">Progress</div>
<div id="progress-percent" class="stat-value">0%</div>
</div>

</div>

<div class="progress-bar">
<div id="progress-fill" class="progress-fill"></div>
</div>



<div class="history-section">

<!-- ?? NEW VIEW BUTTONS -->

<div class="view-buttons">

<button id="daily-inside-btn" class="btn btn-view active-view">
Daily (Inside)
</button>

<button id="daily-outside-btn" class="btn btn-view">
Daily (Outside)
</button>

<button id="weekly-inside-btn" class="btn btn-view">
Weekly (Inside)
</button>

<button id="weekly-outside-btn" class="btn btn-view">
Weekly (Outside)
</button>

</div>


<div class="export-row">
<button id="export-btn" class="btn btn-export">Export Data</button>
</div>

<div id="history-list" class="history-list"></div>

</div>



<div class="danger-zone">
<button id="clear-data-btn" class="btn btn-danger">Clear All Data</button>
</div>

</div>



<!-- Manual entry popup -->

<div id="manual-entry-card" class="manual-card hidden">

<div class="manual-content">

<h2>Add Manual Session</h2>

<!-- ?? NEW TYPE SELECTOR -->
<label>Type</label>
<select id="manual-type">
<option value="inside">Inside Department</option>
<option value="outside">Outside Department</option>
</select>

<label>Date</label>
<input type="date" id="manual-date">

<label>Start Time</label>
<input type="time" id="manual-start">

<label>End Time</label>
<input type="time" id="manual-end">

<div class="manual-buttons">
<button id="manual-save" class="btn btn-primary btn-small">Save</button>
<button id="manual-cancel" class="btn btn-secondary btn-small">Cancel</button>
</div>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
